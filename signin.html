<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #E0FBE2;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            background-color: #006769;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

       

        .ul {
            display: inline;
            justify-content: space-between;
            width: 100%;
            background-color: #006769;
            color: white;
        }

        .ul li {
            display: inline;
            color: white;
        }

        .ul li a {
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            
        }

        .ul li a:hover {
            background-color: #017476;
        }

        .container1 {
            display: flex;
            gap: 50px;
            margin-top: 20px;
        }

        .form-container {
            background-color: #E0FBE2;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        h2 {
            color: #E0FBE2;
            margin-bottom: 20px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            background-color: #006769;
            color: #E0FBE2;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #027c7e;
        }
    </style>
</head>
<body>
    <ul class="ul">
        <li style="display: inline; color: #E0FBE2;text-align: center;padding: 14px 16px;text-decoration:none;float:left">EventSphere</li>
        <li class="li"><a href="default.asp">Ana Sayfa</a></li>
        <li class="li"><a href="news.asp">Takvim</a></li>
        <li class="li"><a href="contact.asp">Profil</a></li>
    </ul>
    <div class="container1">
        <div class="form-container">
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">
            <label for="password">Şifre:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password">
            <button type="submit">Giriş Yap</button>
        </div>
        <div class="form-container">
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">
            <label for="password">Şifre:</label>
            <input type="password" id="password" name="password" placeholder="Enter your password">
            <button type="submit">Kayıt Ol</button>
        </div>
    </div>
</body>
</html>
